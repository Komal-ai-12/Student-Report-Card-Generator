<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Report Card Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🎓 Student Report Card</h1>

    <label>Student Name</label>
    <input type="text" id="name" placeholder="Enter Name">

    <label>Roll Number</label>
    <input type="text" id="roll" placeholder="Enter Roll Number">

    <label>English</label>
    <input type="number" id="english" placeholder="out of 100">

    <label>Math</label>
    <input type="number" id="math" placeholder="out of 100">

    <label>Science</label>
    <input type="number" id="science" placeholder="out of 100">

    <label>Computer</label>
    <input type="number" id="computer" placeholder="out of 100">

    <label>Hindi</label>
    <input type="number" id="hindi" placeholder="out of 100">

    <div class="buttons">
        <button onclick="generateReport()">Generate Report</button>
        <button onclick="resetForm()">Reset</button>
    </div>

    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
